spring.application.name=Revpay1

# Server
server.port=8081

# ── External secrets (gitignored) ──
spring.config.import=optional:classpath:secrets.properties

# Database (Oracle 23ai) — credentials in secrets.properties
spring.datasource.url=${db.url}
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
spring.datasource.hikari.maximum-pool-size=20

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Email (Gmail SMTP) credentials in secrets.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${mail.username}
spring.mail.password=${mail.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
