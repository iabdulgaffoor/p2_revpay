<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login | RevPay</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <nav>
        <div class="logo">REVPAY</div>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/register}">Register</a>
        </div>
    </nav>
    <div class="auth-card auth-page-card">
        <h2 class="mb-2">Access Account</h2>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="username" required placeholder="name@domain.com">
            </div>
            <div class="form-group">
                <label>Credentials</label>
                <input type="password" name="password" required placeholder="Secret Key">
            </div>
            <button type="submit" class="btn btn-primary w-full">Authenticate</button>
        </form>
    </div>
</body>

</html>
