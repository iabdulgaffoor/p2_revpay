<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: headFragment('Register - RevPay')}"></div>
</head>

<body>
    <div th:replace="~{fragments/layout :: headerFragment}"></div>

    <div class="main-content" style="max-width: 600px; margin: 40px auto;">
        <div class="card">
            <h1 style="font-weight: 700; font-size: 1.5rem; margin-bottom: 8px; text-align: center;">Create Account</h1>
            <p style="color: var(--text-muted); text-align: center; font-size: 0.875rem; margin-bottom: 32px;">Join
                RevPay to manage your financial ecosystem</p>

            <form id="registerForm" onsubmit="event.preventDefault(); submitRegister();">
                <div class="form-group">
                    <label for="accountType">Account Type</label>
                    <select id="accountType" onchange="toggleBusinessFields()">
                        <option value="PERSONAL">Personal Account</option>
                        <option value="BUSINESS">Business Account</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="fullName">Legal Full Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="password">Account Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="transactionPin">Transaction PIN</label>
                        <input type="password" id="transactionPin" name="transactionPin" pattern="\d{4,6}"
                            placeholder="4-6 digits" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="securityQuestion">Security Recovery Question</label>
                    <select id="securityQuestion" name="securityQuestion" required>
                        <option value="" disabled selected>Choose a verification question</option>
                        <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                        <option value="What was the name of your first pet?">What was the name of your first pet?
                        </option>
                        <option value="What was the name of your first school?">What was the name of your first school?
                        </option>
                        <option value="In what city were you born?">In what city were you born?</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="securityAnswer">Recovery Answer</label>
                    <input type="text" id="securityAnswer" name="securityAnswer" placeholder="Your answer" required>
                </div>

                <!-- Business Fields (Hidden by default) -->
                <div id="businessFields"
                    style="display:none; padding-top: 24px; margin-top: 24px; border-top: 1px solid var(--border-color);">
                    <div class="card-title">Business Information</div>
                    <div class="form-group">
                        <label for="businessName">Registered Business Name</label>
                        <input type="text" id="businessName" name="businessName" placeholder="Legal entity name">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label for="businessType">Industry Type</label>
                            <input type="text" id="businessType" name="businessType" placeholder="e.g. Technology">
                        </div>
                        <div class="form-group">
                            <label for="taxId">Tax Identification Number</label>
                            <input type="text" id="taxId" name="taxId" placeholder="TIN / Registration ID">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="businessAddress">Business Headquarters Address</label>
                        <textarea id="businessAddress" name="businessAddress" rows="2"
                            placeholder="Full street address, city, state, zip"></textarea>
                    </div>
                </div>

                <div id="errorMessage" class="error" style="display:none;"></div>
                <div id="successMessage" class="text-success"
                    style="display:none; font-weight: 600; margin-bottom:16px;"></div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 8px;">Create Account</button>
            </form>

            <div
                style="text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border-color);">
                <p style="font-size: 0.875rem; color: var(--text-secondary);">
                    Already have an account? <a th:href="@{/login}"
                        style="font-weight: 600; color: var(--accent-color); text-decoration: none;">Sign in
                        instead</a>.
                </p>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footerFragment}"></div>

    <script th:src="@{/js/register.js}"></script>
</body>

</html>
