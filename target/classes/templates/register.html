<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register | RevPay</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <nav>
        <div class="logo">REVPAY</div>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/login}">Login</a>
        </div>
    </nav>
    <div class="auth-card auth-page-card">
        <h2 class="mb-2">Create Profile</h2>
        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullName" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Transaction PIN (4 digits)</label>
                <input type="password" name="transactionPin" maxlength="4" pattern="\d{4}"
                    title="Please enter a 4-digit PIN" required class="pin-input">
            </div>
            <div class="form-group">
                <label>Account Category</label>
                <select name="accountType" required>
                    <option value="PERSONAL">Personal</option>
                    <option value="BUSINESS">Business</option>
                    <option value="ADMIN">Administrator</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-full">Establish Account</button>
        </form>
    </div>
</body>

</html>
