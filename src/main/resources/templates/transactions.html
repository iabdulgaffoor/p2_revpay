<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: headFragment('Audited Ledger Registry | RevPay')}"></div>
</head>

<body>
    <div th:replace="~{fragments/layout :: headerFragment}"></div>
    <div class="main-content">
        <div style="margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-weight: 600; font-size: 1.8rem; margin: 0;">Audited Ledger Registry</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Comprehensive chronological record of
                    authorized fiscal activities.</p>
            </div>
            <button class="btn btn-secondary"
                style="background: white; color: var(--text-secondary); border: 1px solid var(--border-color); font-size: 0.8125rem;"
                onclick="exportCSV()">Export Audit Trail (CSV)</button>
        </div>

        <!-- Filtering Protocol -->
        <div class="card"
            style="padding: 32px; border: 1px solid var(--border-color); box-shadow: none; margin-bottom: 32px;">
            <div
                style="font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 24px; letter-spacing: 0.05em;">
                Registry Filtering Protocol</div>
            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; align-items: flex-end;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="font-size: 0.75rem;">Reference Search</label>
                    <input type="text" id="searchQuery" placeholder="Recipient, ID, or Memo"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="font-size: 0.75rem;">Activity Classification</label>
                    <select id="filterType"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                        <option value="">All Protocol Types</option>
                        <option value="SEND">Disbursements Sent</option>
                        <option value="REQUEST_PAYMENT">Registry Inflow</option>
                        <option value="ADD_FUNDS">Liquidity Inflow</option>
                        <option value="WITHDRAW">Liquidity Disbursement</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="font-size: 0.75rem;">Authorization Status</label>
                    <select id="filterStatus"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                        <option value="">All Statuses</option>
                        <option value="COMPLETED">Authorized/Complete</option>
                        <option value="PENDING">Processing/Awaiting</option>
                        <option value="FAILED">Declined/Invalid</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="font-size: 0.75rem;">Start Date</label>
                    <input type="date" id="startDate"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="font-size: 0.75rem;">End Date</label>
                    <input type="date" id="endDate"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                </div>
                <button class="btn" onclick="applyFilters()" style="padding: 10px; font-size: 0.8125rem;">Apply
                    Protocol</button>
            </div>
        </div>

        <div class="card" style="overflow-x: auto; border: 1px solid var(--border-color); box-shadow: none;">
            <table id="transactionsTable" style="width: 100%; border-collapse: collapse;">
                <thead style="background: var(--bg-color);">
                    <tr>
                        <th
                            style="padding: 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color);">
                            Reference ID</th>
                        <th
                            style="padding: 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color);">
                            Timestamp</th>
                        <th
                            style="padding: 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color);">
                            Classification</th>
                        <th
                            style="padding: 16px; text-align: right; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color);">
                            Valuation (INR)</th>
                        <th
                            style="padding: 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color);">
                            Status</th>
                        <th
                            style="padding: 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color);">
                            Counterparty</th>
                        <th
                            style="padding: 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color);">
                            Memo</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated via JS -->
                </tbody>
            </table>
            <div id="noResults"
                style="display:none; padding: 48px; text-align: center; color: var(--text-muted); font-size: 0.875rem;">
                No registry records discovered matching the specified criteria.</div>
            <div id="syncLoader"
                style="padding: 48px; text-align: center; color: var(--text-muted); font-size: 0.875rem;">Synchronizing
                ledger entries...</div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footerFragment}"></div>

    <script th:src="@{/js/transactions.js}"></script>
</body>

</html>
