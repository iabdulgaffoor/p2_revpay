<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: headFragment('Payment Instruments | RevPay')}"></div>
</head>

<body>
    <div th:replace="~{fragments/layout :: headerFragment}"></div>

    <div class="main-content">
        <div style="margin-bottom: 32px;">
            <h1 style="font-weight: 600; font-size: 1.8rem; margin: 0;">Payment Instruments</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Manage secure funding sources and primary account
                references.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; align-items: start;">
            <!-- Register Instrument -->
            <div class="card" style="padding: 32px;">
                <div class="card-title" style="margin-bottom: 24px;">Register New Instrument</div>
                <form id="addPaymentForm" onsubmit="event.preventDefault(); handleAddPayment();">
                    <div class="form-group">
                        <label>Instrument Type</label>
                        <select id="methodType" required>
                            <option value="CREDIT_CARD">Credit Instrument</option>
                            <option value="DEBIT_CARD">Debit Instrument</option>
                            <option value="BANK_ACCOUNT">Direct Bank Clearing</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Account Reference Number</label>
                        <input type="text" id="cardNumber" required maxlength="16" placeholder="0000000000000000">
                        <p style="margin-top: 4px; font-size: 0.75rem; color: var(--text-muted);">Format: 16-digit
                            primary account number.</p>
                    </div>
                    <div class="form-group">
                        <label>Account Holder Name</label>
                        <input type="text" id="cardHolder" required
                            placeholder="Legal Name as it appears on instrument">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                        <div class="form-group">
                            <label>Expiration Reference</label>
                            <input type="text" id="expiryDate" required placeholder="MM/YY"
                                pattern="^(0[1-9]|1[0-2])/?([0-9]{2})$">
                        </div>
                        <div class="form-group">
                            <label>Default Priority</label>
                            <label
                                style="display: flex; align-items: center; gap: 10px; cursor: pointer; height: 44px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 6px; padding: 0 12px; font-size: 0.875rem;">
                                <input type="checkbox" id="isDefault" style="width: 18px; height: 18px; margin: 0;">
                                <span>Set as Primary</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Verified Billing Address</label>
                        <input type="text" id="billingAddress" required placeholder="Street address, City, ZIP">
                    </div>

                    <div id="addMsg" style="margin-bottom: 24px; font-size: 0.875rem;"></div>
                    <button type="submit" class="btn" style="width: 100%;">Authorize Instrument</button>
                </form>
            </div>

            <!-- Existing Instruments -->
            <div class="card" style="padding: 32px;">
                <div class="card-title" style="margin-bottom: 24px;">Provisioned Instruments</div>
                <div id="pmLoader" style="color: var(--text-muted); font-size: 0.875rem;">Synchronizing instrument
                    data...</div>
                <div id="pmList" style="display:none; display: flex; flex-direction: column; gap: 12px;"></div>
                <div id="noPm"
                    style="display:none; text-align: center; padding: 40px; border: 1px dashed var(--border-color); border-radius: 8px;">
                    <p style="color: var(--text-muted); font-size: 0.875rem; margin: 0;">No active payment instruments
                        found in registry.</p>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footerFragment}"></div>

    <script th:src="@{/js/payment-methods.js}"></script>
</body>

</html>
