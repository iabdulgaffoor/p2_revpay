<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: headFragment('Communication Logs | RevPay')}"></div>
</head>

<body>
    <div th:replace="~{fragments/layout :: headerFragment}"></div>

    <div class="main-content">
        <div style="margin-bottom: 32px;">
            <h1 style="font-weight: 600; font-size: 1.8rem; margin: 0;">Communication Logs</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem;">System dispatches and security audit
                notifications.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; align-items: start;">

            <div id="notificationsList" class="notification-container"
                style="display: flex; flex-direction: column; gap: 16px;">
                <div style="color: var(--text-muted); font-size: 0.875rem;">Synchronizing communication logs...</div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 32px;">

                <div class="card"
                    style="padding: 32px; background: var(--bg-color); border: 1px solid var(--border-color);">
                    <div class="card-title" style="margin-bottom: 12px; font-size: 0.875rem;">Audit Information</div>
                    <p style="color: var(--text-muted); font-size: 0.8125rem; line-height: 1.6; margin: 0;">
                        Communication logs are retained for 90 days for compliance and audit requirements.</p>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footerFragment}"></div>

    <script th:src="@{/js/notifications.js}"></script>
</body>

</html>
