<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: headFragment('Account Liquidity | RevPay')}"></div>
</head>

<body>
    <div th:replace="~{fragments/layout :: headerFragment}"></div>
    <div class="main-content">
        <div style="margin-bottom: 32px;">
            <h1 style="font-weight: 600; font-size: 1.8rem; margin: 0;">Account Liquidity</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Manage primary asset inflow and disbursement
                protocols.</p>
        </div>

        <div class="card"
            style="padding: 40px; background: linear-gradient(135deg, var(--primary-color) 0%, #1e293b 100%); color: white; border: none; margin-bottom: 32px; position: relative; overflow: hidden;">
            <div
                style="position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: rgba(255,255,255,0.03); border-radius: 50%;">
            </div>
            <div
                style="font-size: 0.8125rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; margin-bottom: 12px;">
                Consolidated Liquid Assets</div>
            <div style="font-size: 3rem; font-weight: 700; letter-spacing: -0.02em;">INR <span
                    id="walletBalance">0.00</span></div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px;">
            <!-- Add Funds Form -->
            <div class="card" style="padding: 32px; border: 1px solid var(--border-color); box-shadow: none;">
                <div
                    style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 24px; letter-spacing: 0.05em;">
                    Liquidity Inflow Protocol</div>
                <form id="addFundsForm" onsubmit="event.preventDefault(); addFunds();">
                    <div class="form-group">
                        <label>Asset Transfer Amount (INR)</label>
                        <input type="number" step="0.01" id="addAmount" placeholder="0.00" required
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                    </div>
                    <button type="submit" class="btn" style="width: 100%; padding: 14px;">Authorize Inflow</button>
                    <div id="addMsg" style="margin-top: 16px; font-size: 0.8125rem; text-align: center; display: none;">
                    </div>
                </form>
            </div>

            <!-- Withdraw Funds Form -->
            <div class="card" style="padding: 32px; border: 1px solid var(--border-color); box-shadow: none;">
                <div
                    style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 24px; letter-spacing: 0.05em;">
                    Liquidity Disbursement Protocol</div>
                <form id="withdrawFundsForm" onsubmit="event.preventDefault(); withdrawFunds();">
                    <div class="form-group">
                        <label>Disbursement Amount (INR)</label>
                        <input type="number" step="0.01" id="withdrawAmount" placeholder="0.00" required
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                    </div>
                    <button type="submit" class="btn btn-secondary"
                        style="width: 100%; padding: 14px; background: var(--bg-color); color: var(--text-secondary); border: 1px solid var(--border-color);">Requisition
                        Disbursement</button>
                    <div id="withdrawMsg"
                        style="margin-top: 16px; font-size: 0.8125rem; text-align: center; display: none;"></div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footerFragment}"></div>

    <script th:src="@{/js/wallet.js}"></script>
</body>

</html>
