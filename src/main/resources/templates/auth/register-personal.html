<!doctype html>
<html
  lang="en"
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{layout/main-layout :: main-layout(~{::title}, ~{::content})}">
  <head>
    <title>Register Personal User | Auth | RevPay</title>
  </head>
  <body>
    <div th:fragment="content">
      <form class="form-container" th:object="${registerDto}">
        <div class="form-section-container">
          <h2>Personal Account</h2>
          <hr />
          <div class="form-div">
            <label class="form-label" for="first-name">First Name:</label>
            <input
              class="form-input"
              type="text"
              id="first-name"
              th:field="*{firstName}" />
          </div>
          <div class="form-div">
            <label class="form-label" for="last-name">Last Name:</label>
            <input
              class="form-input"
              type="text"
              id="last-name"
              th:field="*{lastName}" />
          </div>
          <div class="form-div">
            <label class="form-label" for="phone-number">Phone:</label>
            <input
              class="form-input"
              type="tel"
              id="phone-number"
              th:field="*{phone}" />
          </div>
        </div>
        <div class="form-section-container">
          <h2>Auth Details</h2>
          <hr />
          <div class="form-div">
            <label class="form-label" for="e-mail">Email:</label>
            <input
              class="form-input"
              type="email"
              id="e-mail"
              th:field="*{email}" />
          </div>
          <div class="form-div">
            <label class="form-label" for="pass-code">Password:</label>
            <input
              class="form-input"
              type="password"
              id="pass-code"
              th:field="*{passKey}" />
          </div>
          <div class="form-div">
            <label class="form-label" for="security-question-id"
              >Security Question:</label
            >
            <select
              class="form-input"
              id="security-question-id"
              th:field="*{securityQuestionId}">
              <option
                th:each="q : ${questions}"
                th:value="${q.id}"
                th:text="${q.question}"></option>
            </select>
          </div>
          <div class="form-div">
            <label class="form-label" for="security-answer"
              >Security Answer:</label
            >
            <input
              class="form-input"
              type="text"
              id="security-answer"
              th:field="*{userSecurityAnswer}" />
          </div>
        </div>
        <div class="form-section-container">
          <h2>Wallet Account</h2>
          <hr>
          <div class="form-div">
            <label class="form-label" for="balance">Balance:</label>
            <input
              class="form-input"
              type="number"
              id="balance"
              th:field="*{walletBalance}" />
          </div>
          <div class="form-div">
            <label class="form-label" for="transaction-pin"
              >Transaction Pin:</label
            >
            <input
              class="form-input"
              type="number"
              id="transaction-pin"
              th:field="*{transactionPin}" />
          </div>
        </div>
        <button class="btn" type="submit" onclick="registerUser(event)">Register</button>
      </form>
      <script th:src="@{/js/auth.js}"></script>
    </div>
  </body>
</html>
