<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
th:replace="layout/main-layout :: main-layout(~{::title}, ~{::content})">

<head>
    <title>Register Personal User | RevPay</title>
</head>
<body>
    <th:block th:replace="~{layout/auth-layout :: auth-layout(~{::title}, ~{::content})}">
    </th:block>
    <div th:fragment="content">
        <form th:object="${registerDto}">
            <div>
                <label for="first-name">First Name:</label>
                <input type="text" id="first-name" th:field="*{firstName}" />
            </div>
            <div>
                <label for="last-name">Last Name:</label>
                <input type="text" id="last-name" th:field="*{lastName}" />
            </div>
            <div>
                <label for="e-mail">Email:</label>
                <input type="email" id="e-mail" th:field="*{email}" />
            </div>
            <div>
                <label for="phone-number">Phone:</label>
                <input type="tel" id="phone-number" th:field="*{phone}" />
            </div>
            <button type="submit">Register</button>
        </form>

        <script>
            document.querySelector("form").addEventListener("submit", function(e) {
                e.preventDefault();
                console.log(document.querySelector("#e-mail").value);

                fetch("/api/register-personal", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        firstName: document.querySelector("#first-name").value,
                        lastName: document.querySelector("#last-name").value,
                        email: document.querySelector("#e-mail").value,
                        phone: document.querySelector("#phone-number").value
                    })
                })
                .then(res => res.json())
                .then(data => console.log(data))
                .catch(error => console.error(error));
            });
        </script>
    </div>
</body>
</html>
