<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
th:replace="~{layout/main-layout :: main-layout(~{::title}, ~{::content})}">

<head>
    <title>Register Personal User | Auth | RevPay</title>
</head>
<body>
    <div th:fragment="content">
        <form th:object="${registerDto}">
            <h2>Personal Account</h2>
            <div>
                <label for="first-name">First Name:</label>
                <input type="text" id="first-name" th:field="*{firstName}" />
            </div>
            <div>
                <label for="last-name">Last Name:</label>
                <input type="text" id="last-name" th:field="*{lastName}" />
            </div>
            <div>
                <label for="phone-number">Phone:</label>
                <input type="tel" id="phone-number" th:field="*{phone}" />
            </div>
            <h2>Auth Details</h2>
            <div>
                <label for="e-mail">Email:</label>
                <input type="email" id="e-mail" th:field="*{email}" />
            </div>
            <div>
                <label for="pass-code">Password:</label>
                <input type="password" id="pass-code" th:field="*{passKey}" />
            </div>
            <div>
                <label for="security-question-id">Security Question:</label>
                <select id="security-question-id" th:field="*{securityQuestionId}">
                    <option th:each="q : ${questions}"
                            th:value="${q.id}"
                            th:text="${q.question}">
                    </option>
                </select>
            </div>
            <div>
                <label for="security-answer" >Security Answer:</label>
                <input type="text" id="security-answer" th:field="*{userSecurityAnswer}" />
            </div>
            <h2>Wallet Account</h2>
            <div>
                <label for="balance">Balance:</label>
                <input type="number" id="balance" th:field="*{walletBalance}" />
            </div>
            <div>
                <label for="transaction-pin">Transaction Pin:</label>
                <input type="number" id="transaction-pin" th:field="*{transactionPin}" />
            </div>
            <button type="submit" onclick="registerUser(event)">Register</button>
        </form>
        <script th:src="@{/js/auth.js}"></script>
    </div>
</body>
</html>
