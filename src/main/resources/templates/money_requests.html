<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: headFragment('Funds Solicitation | RevPay')}"></div>
</head>

<body>
    <div th:replace="~{fragments/layout :: headerFragment}"></div>

    <div class="main-content">
        <div style="margin-bottom: 32px;">
            <h1 style="font-weight: 600; font-size: 1.8rem; margin: 0;">Funds Solicitation</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Manage incoming and outgoing payment requests
                through the registry ledger.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; align-items: start;">
            <!-- Send Request Form -->
            <div class="card" style="padding: 40px; border: 1px solid var(--border-color); box-shadow: none;">
                <div
                    style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 32px; letter-spacing: 0.05em;">
                    Initialize Solicitation protocol</div>
                <form id="reqForm" onsubmit="event.preventDefault(); sendRequest();">
                    <div class="form-group">
                        <label>Recipient Primary Identifier</label>
                        <input type="text" id="reqIdentifier" placeholder="Official Registered Identity (Email/ID)"
                            required
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                    </div>
                    <div class="form-group">
                        <label>Solicitation Amount (USD)</label>
                        <input type="number" id="reqAmount" step="0.01" min="0.01" placeholder="0.00" required
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color);">
                    </div>
                    <div class="form-group">
                        <label>Rationalized Purpose of Solicitation</label>
                        <textarea id="reqPurpose" rows="3"
                            placeholder="Specify the formal basis for this solicitation..." required
                            style="width: 100%; border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; font-family: inherit; font-size: 0.9375rem; background: var(--bg-color);"></textarea>
                    </div>
                    <div id="reqMsg" style="margin-bottom: 24px; font-size: 0.8125rem; text-align: center;"></div>
                    <button type="submit" class="btn" style="width: 100%; padding: 14px;">Authorize Dispatch</button>
                </form>
            </div>

            <!-- Requests Lists -->
            <div style="display: flex; flex-direction: column; gap: 48px;">
                <!-- Incoming Requests -->
                <div>
                    <div
                        style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 24px; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px;">
                        <span>Incoming Solicitations</span>
                        <div id="incomingCount" class="status-badge status-info"
                            style="font-size: 0.625rem; padding: 2px 8px; display:none;">0</div>
                    </div>
                    <div id="incomingLoader" style="color: var(--text-muted); font-size: 0.875rem;">Synchronizing
                        registry ledger...</div>
                    <div id="incomingList" style="display:none; display: flex; flex-direction: column; gap: 20px;">
                    </div>
                </div>

                <!-- Outgoing Requests -->
                <div>
                    <div
                        style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 24px; letter-spacing: 0.05em;">
                        Dispatched Ledger Archive</div>
                    <div id="outgoingLoader" style="color: var(--text-muted); font-size: 0.875rem;">Synchronizing
                        archive records...</div>
                    <div id="outgoingList" style="display:none; display: flex; flex-direction: column; gap: 20px;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Authorization PIN Modal -->
    <div id="pinModal" class="modal">
        <div class="modal-content"
            style="max-width: 440px; padding: 40px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);">
            <div
                style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 12px; letter-spacing: 0.05em;">
                Registry Authorization Required</div>
            <p id="pinModalText"
                style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 32px; line-height: 1.6;"></p>

            <div class="form-group">
                <label style="font-size: 0.75rem;">Confidential Protocol PIN</label>
                <input type="password" id="acceptPin" required maxlength="6" placeholder="••••••"
                    style="width: 100%; padding: 14px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-color); font-size: 1.25rem; letter-spacing: 0.5em; text-align: center;">
            </div>

            <input type="hidden" id="acceptReqId">
            <div id="pinError"
                style="color: var(--danger); margin-bottom: 24px; font-size: 0.8125rem; display:none; text-align: center;">
            </div>

            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px;">
                <button class="btn" onclick="confirmAccept()" style="padding: 12px;">Authorize Settlement</button>
                <button class="btn btn-secondary" onclick="closePinModal()"
                    style="background: white; color: var(--text-secondary); border: 1px solid var(--border-color); padding: 12px;">Decline</button>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footerFragment}"></div>

    <script th:src="@{/js/money-requests.js}"></script>
</body>

</html>
