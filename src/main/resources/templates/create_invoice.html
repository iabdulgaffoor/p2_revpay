<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: headFragment('Initialize Billing Statement | RevPay')}"></div>
</head>

<body>
    <div th:replace="~{fragments/layout :: headerFragment}"></div>

    <div class="main-content">
        <div
            style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; max-width: 900px; margin-left: auto; margin-right: auto;">
            <div>
                <h1 style="font-weight: 600; font-size: 1.8rem; margin: 0;">Initialize Billing Statement</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Generate formal financial solicitations for
                    verified client entities.</p>
            </div>
            <a href="/invoice/manage" class="btn btn-secondary"
                style="background: var(--bg-color); color: var(--text-secondary); border: 1px solid var(--border-color);">Discard
                Protocol</a>
        </div>

        <div class="card"
            style="max-width: 900px; margin: 0 auto; padding: 48px; border: 1px solid var(--border-color); box-shadow: none;">
            <form id="createInvoiceForm" onsubmit="event.preventDefault(); submitInvoice();">

                <!-- Section 1: Customer -->
                <div
                    style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 24px; letter-spacing: 0.05em;">
                    Entity Billing Detail</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px;">
                    <div class="form-group">
                        <label>Contact Principal Name</label>
                        <input type="text" id="custName" placeholder="Legal entity or individual name" required>
                    </div>
                    <div class="form-group">
                        <label>Verified Billing Email</label>
                        <input type="email" id="custEmail" placeholder="billing@entity.com" required>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 48px;">
                    <label>Registered Billing Address</label>
                    <textarea id="custAddress" rows="2" placeholder="Full registered address for fiscal documentation"
                        style="width: 100%; border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; font-family: inherit; font-size: 0.9375rem; background: var(--bg-color);"></textarea>
                </div>

                <!-- Section 2: Invoice Details -->
                <div
                    style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); margin-bottom: 24px; letter-spacing: 0.05em;">
                    Fiscal Terms</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 48px;">
                    <div class="form-group">
                        <label>Settlement Deadline</label>
                        <input type="date" id="dueDate" required>
                    </div>
                    <div class="form-group">
                        <label>Contractual Settlement Terms</label>
                        <select id="paymentTerms"
                            style="width: 100%; border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; font-family: inherit; font-size: 0.9375rem; background: var(--bg-color);">
                            <option value="Due on Receipt">Immediate Settlement</option>
                            <option value="Net 15">Net 15 Days</option>
                            <option value="Net 30">Net 30 Days</option>
                            <option value="Net 60">Net 60 Days</option>
                        </select>
                    </div>
                </div>

                <!-- Section 3: Line Items -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div
                        style="font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; color: var(--primary-color); letter-spacing: 0.05em;">
                        Statement Line Composition</div>
                    <button type="button" class="btn btn-sm btn-secondary"
                        style="font-size: 0.75rem; padding: 6px 12px; background: var(--bg-color); color: var(--text-secondary); border: 1px solid var(--border-color);"
                        onclick="addLineItem()">Append Line Row</button>
                </div>

                <div
                    style="overflow-x: auto; margin-bottom: 40px; border: 1px solid var(--border-color); border-radius: 8px;">
                    <table class="transaction-table" id="itemsTable"
                        style="min-width: 800px; width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: var(--bg-color);">
                                <th
                                    style="width: 35%; padding: 16px 20px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); text-align: left;">
                                    Service/Product Specification</th>
                                <th
                                    style="width: 15%; padding: 16px 20px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); text-align: left;">
                                    Qty</th>
                                <th
                                    style="width: 15%; padding: 16px 20px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); text-align: left;">
                                    Unit Valuation</th>
                                <th
                                    style="width: 15%; padding: 16px 20px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); text-align: left;">
                                    Applied Levy</th>
                                <th
                                    style="width: 15%; padding: 16px 20px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); text-align: left;">
                                    Net Subtotal</th>
                                <th style="width: 5%; padding: 16px 20px;"></th>
                            </tr>
                        </thead>
                        <tbody id="itemsBody"></tbody>
                        <tfoot style="background: var(--bg-color);">
                            <tr>
                                <td colspan="4"
                                    style="text-align: right; padding: 20px; font-weight: 700; font-size: 1rem; color: var(--text-secondary);">
                                    Aggregate Statement Total:</td>
                                <td colspan="2"
                                    style="padding: 20px; font-weight: 700; font-size: 1.125rem; color: var(--primary-color);"
                                    id="grandTotalText">INR 0.00</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div id="invoiceMsg" style="margin-bottom: 32px; font-size: 0.875rem; text-align: center;"></div>
                <button type="submit" class="btn"
                    style="width: 100%; padding: 16px; font-size: 1rem; font-weight: 600;">Authorize and Dispatch
                    Statement</button>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footerFragment}"></div>

    <script th:src="@{/js/create-invoice.js}"></script>
</body>

</html>
