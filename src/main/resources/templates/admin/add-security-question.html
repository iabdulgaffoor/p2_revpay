<!DOCTYPE html>
<html lang="en"
        xmlns:th="https://www.thymeleaf.org"
        th:replace="~{layout/dashboard-layout :: dashboard-layout(~{::title}, ~{::content})}">
<head>
    <title>Security Question | Admin | Revpay</title>
</head>
<body>
    <section th:fragment="content">
        <form class="form-container" th:object="${securityQuestion}">
            <div class="form-section-container">
                <h2>Add Security Question</h2>
                <div class="form-div">
                    <label class="form-label" for="security-question">Security Question:</label>
                    <input class="form-input" id="security-question" type="text" th:field="*{question}" />
                </div>
            </div>
            <button class="btn" type="submit" onclick="addSecurityQuestion(event)">Add</button>
        </form>
        <script th:src="@{/js/auth.js}"></script>
    </section>
</body>
</html>
