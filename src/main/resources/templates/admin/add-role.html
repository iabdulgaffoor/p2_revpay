<!doctype html>
<html
  lang="en"
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{layout/dashboard-layout :: dashboard-layout(~{::title}, ~{::content})}">
  <head>
    <title>Add Role | admin panel | Revpay</title>
  </head>
  <body>
    <section th:fragment="content">
      <form class="form-container" th:object="${role}">
        <div class="form-section-container">
          <h2>Add Role</h2>
          <hr />
          <div class="form-div">
            <label class="form-label" for="role-name">Role Name:</label>
            <input
              class="form-input"
              id="role-name"
              type="text"
              th:field="*{name}" />
          </div>
        </div>
        <button class="btn" type="submit" onclick="addRoleForm(event)">
          Add
        </button>
      </form>
      <script th:src="@{/js/role.js}"></script>
    </section>
  </body>
</html>
