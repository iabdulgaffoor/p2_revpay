<!DOCTYPE html>
<html lang="en"
        xmlns:th="https://www.thymeleaf.org"
        th:fragment="dashboard-layout(title, content)">
    <head>
        <meta charset="UTF-8">
        <th:block th:replace="${title}"></th:block>
    </head>
    <body>
        <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
        <main>
            <th:block th:replace="~{fragments/sidebar-admin :: sidebar}"></th:block>
            <th:block th:replace="${content}"></th:block>
        </main>
    </body>
</html>
